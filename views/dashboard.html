<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - BlogNest</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container">
    <div class="dashboard-header">
      <h2>Dashboard</h2>
      <button class="btn btn-primary" onclick="openCreatePost()">+ New Post</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="feed" onclick="switchTab('feed')">Feed</button>
      <button class="tab-btn" data-tab="my-posts" onclick="switchTab('my-posts')">My Posts</button>
      <button class="tab-btn" data-tab="groups" onclick="switchTab('groups')">Groups</button>
      <button class="tab-btn" data-tab="notifications" onclick="switchTab('notifications')">Notifications</button>
    </div>

    <!-- Feed Tab -->
    <div class="tab-content active" id="tab-feed">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search posts by title or tag..." autocomplete="off">
        <button class="btn btn-primary btn-sm" onclick="performSearch()">🔍 Search</button>
      </div>
      <div id="feed-loading" class="loading">
        <div class="spinner"></div>
      </div>
      <div id="feed-empty" class="empty-state" style="display:none">
        <h3>No posts yet</h3>
        <p>Be the first to publish a post!</p>
      </div>
      <div class="posts-grid" id="feed-posts"></div>
      <div class="pagination" id="feed-pagination"></div>
    </div>

    <!-- My Posts Tab -->
    <div class="tab-content" id="tab-my-posts">
      <div id="my-posts-loading" class="loading">
        <div class="spinner"></div>
      </div>
      <div id="my-posts-empty" class="empty-state" style="display:none">
        <h3>You haven't written any posts</h3>
        <p>Click "New Post" to get started!</p>
      </div>
      <div class="posts-grid" id="my-posts-list"></div>
      <div class="pagination" id="my-posts-pagination"></div>
    </div>

    <!-- Notifications Tab -->
    <div class="tab-content" id="tab-notifications">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn btn-sm btn-secondary" onclick="markAllRead()">Mark all as read</button>
      </div>
      <div id="notif-loading" class="loading">
        <div class="spinner"></div>
      </div>
      <div id="notif-empty" class="empty-state" style="display:none">
        <h3>No notifications</h3>
        <p>You're all caught up!</p>
      </div>
      <div class="card">
        <div class="notification-list" id="notif-list"></div>
      </div>
      <div class="pagination" id="notif-pagination"></div>
    </div>

    <!-- Groups Tab -->
    <div class="tab-content" id="tab-groups">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="margin:0">My Groups</h3>
        <button class="btn btn-primary btn-sm" onclick="openCreateGroup()">+ New Group</button>
      </div>

      <div id="invites-section" style="display:none; margin-bottom: 24px;">
        <h4 style="margin-bottom: 12px; color: var(--primary);">Pending Invitations</h4>
        <div id="invites-list" class="posts-grid"></div>
        <hr style="margin: 24px 0; border: none; border-top: 1px solid var(--light-gray);">
      </div>

      <div id="groups-loading" class="loading">
        <div class="spinner"></div>
      </div>
      <div id="groups-empty" class="empty-state" style="display:none">
        <h3>No groups yet</h3>
        <p>Create a group or join one!</p>
      </div>
      <div class="posts-grid" id="groups-list"></div>
    </div>
  </div>

  <!-- Create/Edit Post Modal -->
  <div class="modal-overlay" id="postModal">
    <div class="modal" style="position:relative">
      <button class="modal-close" onclick="closePostModal()">&times;</button>
      <h2 id="modalTitle">Create New Post</h2>
      <div id="modal-alert" class="alert"></div>
      <form id="postForm">
        <input type="hidden" id="editPostId">
        <div class="form-group">
          <label for="postTitle">Title</label>
          <input type="text" id="postTitle" placeholder="Enter post title" required>
        </div>
        <div class="form-group">
          <label for="postContent">Content</label>
          <textarea id="postContent" placeholder="Write your post content..." rows="10" required></textarea>
        </div>
        <div class="form-group">
          <label for="postCover">Cover Image URL (optional)</label>
          <input type="text" id="postCover" placeholder="https://example.com/image.jpg">
        </div>
        <div class="form-group">
          <label for="postTag">Tag (e.g., Tech, Lifestyle)</label>
          <input type="text" id="postTag" placeholder="Enter a tag" required>
        </div>
        <div class="form-group">
          <label for="postStatus">Status</label>
          <select id="postStatus">
            <option value="published">Published</option>
            <option value="draft">Draft</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="postSubmitBtn">Publish Post</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) { /* redirected */ }
    renderNavbar();

    const currentUser = api.getUser();
    let currentFeedPage = 1;
    let currentMyPostsPage = 1;
    let currentNotifPage = 1;
    let currentSearchQuery = '';

    // Check for hash-based tab
    if (window.location.hash === '#notifications') {
      switchTab('notifications');
    } else {
      loadFeed(1);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');

      if (tab === 'feed') loadFeed(currentFeedPage);
      else if (tab === 'my-posts') loadMyPosts(currentMyPostsPage);
      else if (tab === 'groups') loadGroups();
      else if (tab === 'notifications') loadNotifications(currentNotifPage);
    }

    function performSearch() {
      currentSearchQuery = document.getElementById('searchInput').value.trim();
      loadFeed(1);
    }

    // Allow pressing Enter to search
    document.getElementById('searchInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') performSearch();
    });

    // ===== Feed =====
    async function loadFeed(page) {
      currentFeedPage = page;
      const loading = document.getElementById('feed-loading');
      const empty = document.getElementById('feed-empty');
      const container = document.getElementById('feed-posts');
      loading.style.display = 'flex';
      empty.style.display = 'none';
      container.innerHTML = '';

      try {
        let url = `/posts?page=${page}&limit=9`;
        if (currentSearchQuery) {
          url += `&search=${encodeURIComponent(currentSearchQuery)}`;
        }
        const res = await api.get(url);
        loading.style.display = 'none';
        const posts = res.data.data;

        if (posts.length === 0) {
          empty.style.display = 'block';
          document.getElementById('feed-empty').innerHTML = currentSearchQuery
            ? `<h3>No results found</h3><p>No posts match "${currentSearchQuery}"</p><button class="btn btn-sm btn-secondary" onclick="clearSearch()" style="margin-top:8px">Clear Search</button>`
            : `<h3>No posts yet</h3><p>Be the first to publish a post!</p>`;
          return;
        }

        container.innerHTML = posts.map(post => renderPostCard(post)).join('');
        renderPagination('feed-pagination', res.data.pagination, loadFeed);
      } catch (err) {
        loading.style.display = 'none';
        container.innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
      }
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      currentSearchQuery = '';
      loadFeed(1);
    }

    // ===== My Posts =====
    async function loadMyPosts(page) {
      currentMyPostsPage = page;
      const loading = document.getElementById('my-posts-loading');
      const empty = document.getElementById('my-posts-empty');
      const container = document.getElementById('my-posts-list');
      loading.style.display = 'flex';
      empty.style.display = 'none';
      container.innerHTML = '';

      try {
        const res = await api.get(`/posts/user/${currentUser.id}?page=${page}&limit=9`);
        loading.style.display = 'none';
        const posts = res.data.data;

        if (posts.length === 0) {
          empty.style.display = 'block';
          return;
        }

        container.innerHTML = posts.map(post => renderPostCard(post, true)).join('');
        renderPagination('my-posts-pagination', res.data.pagination, loadMyPosts);
      } catch (err) {
        loading.style.display = 'none';
        container.innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
      }
    }

    // ===== Notifications =====
    async function loadNotifications(page) {
      currentNotifPage = page;
      const loading = document.getElementById('notif-loading');
      const empty = document.getElementById('notif-empty');
      const container = document.getElementById('notif-list');
      loading.style.display = 'flex';
      empty.style.display = 'none';
      container.innerHTML = '';

      try {
        const res = await api.get(`/notifications?page=${page}&limit=15`);
        loading.style.display = 'none';
        const notifs = res.data.data;

        if (notifs.length === 0) {
          empty.style.display = 'block';
          return;
        }

        container.innerHTML = notifs.map(n => `
          <div class="notification-item ${n.isRead ? '' : 'unread'}">
            <div class="notif-content">
              <div class="notif-message">${n.message}</div>
              <div class="notif-time">${timeAgo(n.createdAt)}</div>
            </div>
            <div class="notif-actions">
              ${!n.isRead ? `<button class="btn btn-sm btn-secondary" onclick="markRead(${n.id})">Read</button>` : ''}
              ${n.post ? `<a href="/post/${n.post.slug}" class="btn btn-sm btn-outline">View</a>` : ''}
              <button class="btn btn-sm btn-danger" onclick="deleteNotif(${n.id})">✕</button>
            </div>
          </div>
        `).join('');
        renderPagination('notif-pagination', res.data.pagination, loadNotifications);
      } catch (err) {
        loading.style.display = 'none';
      }
    }

    async function markRead(id) {
      try {
        await api.put(`/notifications/${id}/read`);
        loadNotifications(currentNotifPage);
        loadUnreadCount();
      } catch (e) { }
    }

    async function markAllRead() {
      try {
        await api.put('/notifications/read-all');
        loadNotifications(currentNotifPage);
        loadUnreadCount();
      } catch (e) { }
    }

    async function deleteNotif(id) {
      try {
        await api.delete(`/notifications/${id}`);
        loadNotifications(currentNotifPage);
      } catch (e) { }
    }

    // ===== Post Card Renderer =====
    function renderPostCard(post, showActions = false) {
      const author = post.author || {};
      const excerpt = truncateText(post.content, 120);
      const coverHtml = post.coverImage
        ? `<img src="${post.coverImage}" class="card-cover" alt="${post.title}">`
        : '';

      let actionsHtml = '';
      if (showActions) {
        actionsHtml = `
          <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); openEditPost(${post.id})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); confirmDeletePost(${post.id})">Delete</button>
        `;
      }

      return `
        <div class="card post-card" onclick="window.location.href='/post/${post.slug}'">
          ${coverHtml}
          <div class="card-body">
            <div class="post-meta">
              <div>
                <a href="/profile/${author.username}" onclick="event.stopPropagation()"><span class="name-box author">${(author.username || 'Unknown').toUpperCase()}</span></a>
                 <span style="margin-left:8px">${timeAgo(post.createdAt)}</span>
               </div>
             </div>
            <h3><a href="/post/${post.slug}" onclick="event.stopPropagation()">${post.title}</a></h3>
            <p class="post-excerpt">${excerpt}</p>
            <div class="card-footer">
              <span class="tag-badge">${post.tags}</span>
            </div>
            <div class="post-actions">
              ${post.status === 'draft' ? '<span style="color:var(--warning)">📝 Draft</span>' : ''}
              ${actionsHtml}
            </div>
          </div>
        </div>
      `;
    }

    // ===== Create/Edit Post =====
    function openCreatePost() {
      document.getElementById('modalTitle').textContent = 'Create New Post';
      document.getElementById('postSubmitBtn').textContent = 'Publish Post';
      document.getElementById('editPostId').value = '';
      document.getElementById('postForm').reset();
      document.getElementById('postModal').classList.add('active');
    }

    async function openEditPost(id) {
      try {
        const res = await api.get(`/posts/${id}`);
        const post = res.data.post;
        document.getElementById('modalTitle').textContent = 'Edit Post';
        document.getElementById('postSubmitBtn').textContent = 'Update Post';
        document.getElementById('editPostId').value = post.id;
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postContent').value = post.content;
        document.getElementById('postCover').value = post.coverImage || '';
        document.getElementById('postTag').value = post.tags || '';
        document.getElementById('postStatus').value = post.status;
        document.getElementById('postModal').classList.add('active');
      } catch (err) {
        alert(err.message);
      }
    }

    function closePostModal() {
      document.getElementById('postModal').classList.remove('active');
    }

    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('postSubmitBtn');
      btn.disabled = true;

      const data = {
        title: document.getElementById('postTitle').value,
        content: document.getElementById('postContent').value,
        coverImage: document.getElementById('postCover').value,
        tags: document.getElementById('postTag').value,
        status: document.getElementById('postStatus').value,
      };

      const editId = document.getElementById('editPostId').value;

      try {
        if (editId) {
          await api.put(`/posts/${editId}`, data);
        } else {
          await api.post('/posts', data);
        }
        closePostModal();
        loadFeed(1);
        loadMyPosts(1);
      } catch (err) {
        showAlert('modal-alert', err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    });

    async function confirmDeletePost(id) {
      if (!confirm('Are you sure you want to delete this post?')) return;
      try {
        await api.delete(`/posts/${id}`);
        loadMyPosts(currentMyPostsPage);
        loadFeed(currentFeedPage);
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
  <script>
    // ===== Groups =====
    async function loadGroups() {
      const loading = document.getElementById('groups-loading');
      const empty = document.getElementById('groups-empty');
      const container = document.getElementById('groups-list');
      loading.style.display = 'flex';
      empty.style.display = 'none';
      container.innerHTML = '';

      try {
        const res = await api.get('/groups/my');
        loading.style.display = 'none';
        const groups = res.data.groups;

        if (groups.length === 0) {
          empty.style.display = 'block';
          return;
        }

        container.innerHTML = groups.map(g => `
          <div class="card group-card" onclick="window.location.href='/groups/${g.id}'">
            <div class="card-body">
              <h3>${g.name}</h3>
              <p class="post-excerpt">${g.description || 'No description'}</p>
              <div class="group-meta">
                <span>👥 ${g.memberCount} members</span>
                <span class="tag-badge">${g.myRole}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        loading.style.display = 'none';
        container.innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
      }
    }

    function openCreateGroup() {
      const html = `
        <div class="modal-overlay active" id="groupModal" onclick="if(event.target===this)this.remove()">
          <div class="modal">
            <div class="modal-header">
              <h3>Create Group</h3>
              <button class="modal-close" onclick="document.getElementById('groupModal').remove()">&times;</button>
            </div>
            <div id="group-modal-alert" class="alert"></div>
            <form onsubmit="submitCreateGroup(event)">
              <div class="form-group">
                <label>Group Name</label>
                <input type="text" id="groupName" placeholder="Enter group name" required>
              </div>
              <div class="form-group">
                <label>Description</label>
                <textarea id="groupDesc" placeholder="What's this group about?" rows="3"></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-block">Create Group</button>
            </form>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', html);
    }

    async function submitCreateGroup(e) {
      e.preventDefault();
      try {
        await api.post('/groups', {
          name: document.getElementById('groupName').value,
          description: document.getElementById('groupDesc').value,
        });
        document.getElementById('groupModal').remove();
        loadGroups();
      } catch (err) {
        showAlert('group-modal-alert', err.message, 'error');
      }
    }

    async function loadInvites() {
      const section = document.getElementById('invites-section');
      const container = document.getElementById('invites-list');
      try {
        const res = await api.get('/groups/invites');
        const groups = res.data.groups;
        if (groups.length === 0) {
          section.style.display = 'none';
          return;
        }
        section.style.display = 'block';
        container.innerHTML = groups.map(g => `
          <div class="card group-card">
            <div class="card-body">
              <div style="display:flex; justify-content:space-between; align-items:flex-start">
                <div>
                  <h3>${g.name}</h3>
                  <p class="post-excerpt">${g.description || ''}</p>
                </div>
              </div>
              <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button class="btn btn-sm btn-primary" onclick="dashboardAcceptInvite(${g.id})">Accept</button>
                <button class="btn btn-sm btn-secondary" onclick="dashboardRejectInvite(${g.id})">Reject</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Failed to load invites:', err);
      }
    }

    async function dashboardAcceptInvite(id) {
      try {
        await api.post(`/groups/${id}/accept`);
        loadInvites();
        loadGroups();
      } catch (err) {
        alert(err.message);
      }
    }

    async function dashboardRejectInvite(id) {
      if (!confirm('Reject this invitation?')) return;
      try {
        await api.post(`/groups/${id}/reject`);
        loadInvites();
      } catch (err) {
        alert(err.message);
      }
    }

    // Call loadInvites when fetching groups
    const originalLoadGroups = loadGroups;
    loadGroups = async function () {
      loadInvites();
      return originalLoadGroups();
    };
  </script>
</body>

</html>
