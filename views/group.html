<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group - BlogNest</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="container">
        <div id="group-detail">
            <div id="group-loading" class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) { /* redirected */ }
        renderNavbar();

        const groupId = window.location.pathname.split('/groups/')[1];
        const currentUser = api.getUser();
        let groupData = null;

        loadGroup();

        async function loadGroup() {
            try {
                const res = await api.get(`/groups/${groupId}`);
                groupData = res.data.group;
                document.title = `${groupData.name} - BlogNest`;
                renderGroup();
            } catch (err) {
                document.getElementById('group-detail').innerHTML = `
          <div class="empty-state">
            <h3>Group not found</h3>
            <p>${err.message}</p>
            <a href="/dashboard" class="btn btn-primary" style="margin-top:16px">Back to Dashboard</a>
          </div>
        `;
            }
        }

        function renderGroup() {
            const g = groupData;
            const isAdmin = g.myRole === 'admin';

            document.getElementById('group-detail').innerHTML = `
        <a href="/dashboard" style="font-size:0.85rem;color:var(--gray)">← Back to Dashboard</a>
        <div class="group-header" style="margin-top:16px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h1>${g.name}</h1>
              <p style="color:var(--gray);margin-top:4px">${g.description || ''}</p>
              <div class="group-meta" style="margin-top:8px">
                <span>👥 ${g.memberCount} members</span>
                <span>Created by <a href="/profile/${g.creator.username}">${g.creator.username}</a></span>
              </div>
            </div>
            <div>
              ${g.isInvited ? `
                <button class="btn btn-primary btn-sm" onclick="acceptInvite()">Accept Invitation</button>
                <button class="btn btn-secondary btn-sm" onclick="rejectInvite()">Reject</button>
              ` : ''}
              ${g.isMember && !isAdmin ? `<button class="btn btn-danger btn-sm" onclick="leaveGroup()">Leave Group</button>` : ''}
              ${isAdmin ? `
                <button class="btn btn-primary btn-sm" onclick="openInviteModal()">Invite Followers</button>
                <button class="btn btn-danger btn-sm" onclick="deleteGroup()">Delete Group</button>
              ` : ''}
              ${!g.isMember && !g.isPending && !g.isInvited ? `<button class="btn btn-primary btn-sm" onclick="joinGroup()">Join Group</button>` : ''}
              ${g.isPending ? `<button class="btn btn-secondary btn-sm" disabled>Request Pending</button>` : ''}
            </div>
          </div>
        </div>

        ${g.isMember ? `
          <div class="tabs" style="margin-top:24px">
            <button class="tab-btn active" onclick="switchGroupTab('posts')">Posts</button>
            <button class="tab-btn" onclick="switchGroupTab('members')">Members</button>
          </div>

          <div id="group-tab-posts">
            <div style="display:flex;justify-content:flex-end;margin:16px 0">
              <button class="btn btn-primary btn-sm" onclick="openGroupPostForm()">+ New Post</button>
            </div>
            <div id="group-posts-loading" class="loading"><div class="spinner"></div></div>
            <div id="group-posts-empty" class="empty-state" style="display:none">
              <h3>No posts in this group</h3>
              <p>Be the first to share something!</p>
            </div>
            <div class="posts-grid" id="group-posts-list"></div>
            <div class="pagination" id="group-posts-pagination"></div>
          </div>

          <div id="group-tab-members" style="display:none">
            <div id="members-list" style="margin-top:16px"></div>
          </div>
        ` : `
          <div class="empty-state" style="margin-top:32px">
            <h3>This is a private group</h3>
            <p>Join to see posts and interact with members.</p>
          </div>
        `}
      `;

            if (g.isMember) {
                loadGroupPosts(1);
            }
        }

        function switchGroupTab(tab) {
            document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('group-tab-posts').style.display = tab === 'posts' ? 'block' : 'none';
            document.getElementById('group-tab-members').style.display = tab === 'members' ? 'block' : 'none';

            if (tab === 'members') loadMembers();
        }

        // ===== Group Posts =====
        let currentGroupPostsPage = 1;

        async function loadGroupPosts(page) {
            currentGroupPostsPage = page;
            const loading = document.getElementById('group-posts-loading');
            const empty = document.getElementById('group-posts-empty');
            const container = document.getElementById('group-posts-list');
            loading.style.display = 'flex';
            empty.style.display = 'none';
            container.innerHTML = '';

            try {
                const res = await api.get(`/groups/${groupId}/posts?page=${page}&limit=9`);
                loading.style.display = 'none';
                const posts = res.data.data;

                if (posts.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                container.innerHTML = posts.map(post => renderGroupPostCard(post)).join('');
                renderPagination('group-posts-pagination', res.data.pagination, loadGroupPosts);
            } catch (err) {
                loading.style.display = 'none';
                container.innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
            }
        }

        function renderGroupPostCard(post) {
            const author = post.author || {};
            const excerpt = truncateText(post.content, 120);
            return `
        <div class="card post-card" onclick="window.location.href='/post/${post.slug}'">
          <div class="card-body">
            <div class="post-meta">
              <div>
                <a href="/profile/${author.username}" onclick="event.stopPropagation()"><span class="name-box author">${(author.username || 'Unknown').toUpperCase()}</span></a>
                <span style="margin-left:8px">${timeAgo(post.createdAt)}</span>
              </div>
            </div>
            <h3>${post.title}</h3>
            <p class="post-excerpt">${excerpt}</p>
            <div class="card-footer">
              <span class="tag-badge">${post.tags}</span>
            </div>
          </div>
        </div>
      `;
        }

        // ===== Create Post in Group =====
        function openGroupPostForm() {
            const html = `
        <div class="modal-overlay active" id="groupPostModal" onclick="if(event.target===this)this.remove()">
          <div class="modal">
            <div class="modal-header">
              <h3>New Group Post</h3>
              <button class="modal-close" onclick="document.getElementById('groupPostModal').remove()">&times;</button>
            </div>
            <div id="gp-alert" class="alert"></div>
            <form onsubmit="submitGroupPost(event)">
              <div class="form-group">
                <label>Title</label>
                <input type="text" id="gpTitle" required>
              </div>
              <div class="form-group">
                <label>Content</label>
                <textarea id="gpContent" rows="6" required></textarea>
              </div>
              <div class="form-group">
                <label>Tag</label>
                <input type="text" id="gpTag" placeholder="e.g. Discussion" required>
              </div>
              <button type="submit" class="btn btn-primary btn-block">Post</button>
            </form>
          </div>
        </div>
      `;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        async function submitGroupPost(e) {
            e.preventDefault();
            try {
                await api.post(`/groups/${groupId}/posts`, {
                    title: document.getElementById('gpTitle').value,
                    content: document.getElementById('gpContent').value,
                    tags: document.getElementById('gpTag').value,
                });
                document.getElementById('groupPostModal').remove();
                loadGroupPosts(1);
            } catch (err) {
                showAlert('gp-alert', err.message, 'error');
            }
        }

        // ===== Members =====
        async function loadMembers() {
            const container = document.getElementById('members-list');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const res = await api.get(`/groups/${groupId}/members`);
                const members = res.data.members;
                const isAdmin = groupData.myRole === 'admin';

                container.innerHTML = members.map(m => {
                    const u = m.user || {};
                    const isPending = m.status === 'pending';
                    return `
            <div class="member-row">
              <div class="member-info">
                <a href="/profile/${u.username}"><strong>${u.username}</strong></a>
                <span class="tag-badge">${m.role}</span>
                ${isPending ? '<span class="tag-badge" style="background:#fff3cd;color:#856404">Pending</span>' : ''}
              </div>
              ${isAdmin && isPending ? `
                <div class="member-actions">
                  <button class="btn btn-sm btn-primary" onclick="manageMember(${u.id}, 'approve')">Approve</button>
                  <button class="btn btn-sm btn-danger" onclick="manageMember(${u.id}, 'reject')">Reject</button>
                </div>
              ` : ''}
            </div>
          `;
                }).join('');
            } catch (err) {
                container.innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
            }
        }

        async function manageMember(userId, action) {
            try {
                await api.put(`/groups/${groupId}/members/${userId}`, { action });
                loadMembers();
                loadGroup();
            } catch (err) {
                alert(err.message);
            }
        }

        // ===== Join / Leave / Delete =====
        async function joinGroup() {
            try {
                await api.post(`/groups/${groupId}/join`);
                loadGroup();
            } catch (err) {
                alert(err.message);
            }
        }

        async function leaveGroup() {
            if (!confirm('Are you sure you want to leave this group?')) return;
            try {
                await api.delete(`/groups/${groupId}/leave`);
                window.location.href = '/dashboard';
            } catch (err) {
                alert(err.message);
            }
        }

        async function deleteGroup() {
            if (!confirm('Are you sure you want to delete this group? All posts will be removed.')) return;
            try {
                await api.delete(`/groups/${groupId}`);
                window.location.href = '/dashboard';
            } catch (err) {
                alert(err.message);
            }
        }

        // ===== Invitations =====
        async function openInviteModal() {
            const html = `
        <div class="modal-overlay active" id="inviteModal" onclick="if(event.target===this)this.remove()">
          <div class="modal">
            <div class="modal-header">
              <h3>Invite Followers</h3>
              <button class="modal-close" onclick="document.getElementById('inviteModal').remove()">&times;</button>
            </div>
            <div id="invite-list" style="max-height: 400px; overflow-y: auto; margin-top: 16px;">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      `;
            document.body.insertAdjacentHTML('beforeend', html);

            try {
                const res = await api.get(`/groups/${groupId}/invite-suggestions`);
                const users = res.data.users;
                const container = document.getElementById('invite-list');

                if (users.length === 0) {
                    container.innerHTML = '<p class="empty-state">No followers to invite.</p>';
                    return;
                }

                container.innerHTML = users.map(u => `
          <div class="member-row">
            <div class="member-info">
              <strong>${u.username}</strong>
            </div>
            <button class="btn btn-sm btn-primary" onclick="sendInvite(${u.id}, this)">Invite</button>
          </div>
        `).join('');
            } catch (err) {
                document.getElementById('invite-list').innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
            }
        }

        async function sendInvite(userId, btn) {
            btn.disabled = true;
            btn.innerText = 'Inviting...';
            try {
                await api.post(`/groups/${groupId}/invite`, { userId });
                btn.innerText = 'Invited';
                btn.classList.replace('btn-primary', 'btn-secondary');
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = 'Invite';
            }
        }

        async function acceptInvite() {
            try {
                await api.post(`/groups/${groupId}/accept`);
                loadGroup();
            } catch (err) {
                alert(err.message);
            }
        }

        async function rejectInvite() {
            try {
                await api.post(`/groups/${groupId}/reject`);
                window.location.href = '/dashboard';
            } catch (err) {
                alert(err.message);
            }
        }
    </script>
</body>

</html>
