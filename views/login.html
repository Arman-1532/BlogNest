<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BlogNest</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Blog<span style="color:#0ea5e9">Nest</span></h1>
      <p class="subtitle">Welcome back! Sign in to your account.</p>
      <div id="alert" class="alert"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign In</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:0.9rem;color:#64748b">
        Don't have an account? <a href="/register">Sign up</a>
      </p>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    if (!requireGuest()) { /* redirected */ }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await api.post('/auth/login', { email, password });
        api.setToken(res.data.token);
        api.setUser(res.data.user);
        window.location.href = '/dashboard';
      } catch (err) {
        showAlert('alert', err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
